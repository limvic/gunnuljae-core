<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🔥 IGNITION v1.5</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Teko:wght@400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600;700&display=swap');

:root {
  --bg:       #07090e;
  --surface:  #0e131c;
  --surface2: #141c28;
  --surface3: #1a2334;
  --border:   #1c2a3e;
  --border2:  #243347;

  --teal:    #00d4ff;
  --green:   #00ff88;
  --orange:  #ff8a00;
  --red:     #ff3a3a;
  --yellow:  #ffd000;
  --purple:  #b884ff;
  --fire:    #ff5500;
  --fire2:   #ffaa00;

  --text:    #e8f2ff;
  --text2:   #7a9cc0;
  --text3:   #3a5070;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Noto Sans KR', sans-serif;
  --display: 'Teko', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 80% 40% at 50% -10%, rgba(255,85,0,.06) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 100% 100%, rgba(255,170,0,.04) 0%, transparent 50%);
  pointer-events: none;
}

.wrap {
  position: relative; z-index: 1;
  max-width: 480px;
  margin: 0 auto;
  padding: 0 0 100px;
}

/* ━━ HEADER ━━ */
.header {
  padding: 16px 16px 0;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
}
.back-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--text3);
  cursor: pointer;
  padding: 6px 0;
  font-family: var(--mono);
  background: none;
  border: none;
  margin-bottom: 4px;
}
.back-btn:active { opacity: .6; }
.title-block {}
.ign-title {
  font-family: var(--display);
  font-size: 38px;
  font-weight: 700;
  line-height: 1;
  letter-spacing: 2px;
  background: linear-gradient(135deg, #ff5500 0%, #ffaa00 60%, #ffd000 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.ign-sub {
  font-size: 9px;
  color: var(--text3);
  letter-spacing: 3px;
  font-weight: 500;
  margin-top: 2px;
  font-family: var(--mono);
}
.ign-tagline {
  font-size: 10px;
  color: var(--fire2);
  margin-top: 4px;
  font-style: italic;
  opacity: .8;
}
.header-right {
  text-align: right;
}
.header-clock {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
}
.header-date {
  font-size: 9px;
  color: var(--text3);
  margin-top: 2px;
}
.mkt-status {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 9px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 10px;
  margin-top: 3px;
}
.mkt-open  { background: rgba(0,255,136,.1);  color: var(--green);  border: 1px solid rgba(0,255,136,.25); }
.mkt-close { background: rgba(90,100,120,.12); color: var(--text3);  border: 1px solid rgba(90,100,120,.2); }
.mkt-dot { width:5px; height:5px; border-radius:50%; }
.mkt-open .mkt-dot { background:var(--green); animation: blink 1.2s infinite; }
.mkt-close .mkt-dot { background:var(--text3); }

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
@keyframes firePulse { 0%,100%{box-shadow:0 0 6px var(--fire)} 50%{box-shadow:0 0 18px var(--fire), 0 0 40px rgba(255,85,0,.3)} }
@keyframes shimmer { from{background-position:200% 0} to{background-position:-200% 0} }
@keyframes feedIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
@keyframes energyPulse { 0%,100%{opacity:.8} 50%{opacity:1} }

/* ━━ CONCEPT STRIP ━━ */
.concept-strip {
  margin: 12px 16px 0;
  background: rgba(255,85,0,.06);
  border: 1px solid rgba(255,85,0,.2);
  border-radius: 10px;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.concept-icons {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
}
.concept-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  font-size: 8px;
  font-family: var(--mono);
  color: var(--text3);
}
.concept-item span { font-size: 14px; }
.concept-sep { color: var(--text3); font-size: 14px; }
.concept-text {
  font-size: 10px;
  color: var(--fire2);
  font-style: italic;
  flex: 1;
  line-height: 1.4;
}

/* ━━ 섹션 레이블 ━━ */
.section-label {
  padding: 14px 16px 6px;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 3px;
  color: var(--text3);
  font-family: var(--mono);
  text-transform: uppercase;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.section-label-right {
  font-size: 9px;
  color: var(--text3);
  cursor: pointer;
  background: none;
  border: none;
  font-family: var(--sans);
}

/* ━━ 필터 바 ━━ */
.filter-bar {
  margin: 0 16px;
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding-bottom: 2px;
}
.filter-btn {
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 10px;
  font-weight: 700;
  font-family: var(--mono);
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text3);
  cursor: pointer;
  white-space: nowrap;
  transition: all .15s;
  flex-shrink: 0;
}
.filter-btn.active-all    { color: var(--text);   border-color: var(--border2); background: var(--surface2); }
.filter-btn.active-watch  { color: var(--yellow); border-color: rgba(255,208,0,.4); background: rgba(255,208,0,.07); }
.filter-btn.active-ready  { color: var(--fire2);  border-color: rgba(255,170,0,.4); background: rgba(255,170,0,.07); }
.filter-btn.active-break  { color: var(--fire);   border-color: rgba(255,85,0,.5);  background: rgba(255,85,0,.1); }

/* ━━ 스캔 버튼 ━━ */
.scan-bar {
  margin: 8px 16px 0;
  display: flex;
  gap: 8px;
}
.scan-btn {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  font-size: 12px;
  font-weight: 700;
  font-family: var(--sans);
  border: 1px solid rgba(255,85,0,.3);
  background: rgba(255,85,0,.08);
  color: var(--fire2);
  cursor: pointer;
  transition: all .2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.scan-btn:active { transform: scale(.97); background: rgba(255,85,0,.15); }
.scan-btn.scanning { opacity: .6; cursor: not-allowed; }
.scan-count {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.scan-count-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1px;
}
.scan-count-num {
  font-family: var(--mono);
  font-size: 16px;
  font-weight: 700;
}
.scan-count-lbl {
  font-size: 8px;
  color: var(--text3);
  font-family: var(--mono);
}
.n-watch { color: var(--yellow); }
.n-ready { color: var(--fire2); }
.n-break { color: var(--fire); }

/* ━━ IGNITION 카드 ━━ */
.cards-list {
  padding: 0 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.ign-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 14px;
  position: relative;
  overflow: hidden;
  animation: feedIn .3s ease;
  transition: border-color .2s;
}
.ign-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 2px;
}
.ign-card.status-WATCH::before      { background: var(--yellow); opacity: .6; }
.ign-card.status-READY::before      { background: var(--fire2);  opacity: .8; }
.ign-card.status-BREAK::before      { background: var(--fire);   opacity: 1;  animation: firePulse 1s infinite; }
.ign-card.status-LATE::before       { background: var(--text3);  opacity: .4; }
.ign-card.status-WATCH { border-color: rgba(255,208,0,.2); }
.ign-card.status-READY { border-color: rgba(255,170,0,.3); }
.ign-card.status-BREAK { border-color: rgba(255,85,0,.5); box-shadow: 0 0 20px rgba(255,85,0,.08); }

/* 카드 헤더 */
.card-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 10px;
}
.card-name-block {}
.card-name {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.2;
}
.card-code {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--text3);
  margin-top: 1px;
}
.card-sector {
  font-size: 9px;
  color: var(--purple);
  margin-top: 2px;
}
.card-price-block {
  text-align: right;
}
.card-price {
  font-family: var(--mono);
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
}
.card-change {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  margin-top: 1px;
}
.chg-up   { color: var(--red); }
.chg-down { color: var(--teal); }
.chg-flat { color: var(--text3); }

/* 에너지 게이지 */
.energy-section {
  margin-bottom: 10px;
}
.energy-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 5px;
}
.energy-label {
  font-size: 9px;
  color: var(--text3);
  font-family: var(--mono);
  font-weight: 700;
  letter-spacing: 1px;
}
.energy-score {
  font-family: var(--display);
  font-size: 22px;
  font-weight: 700;
  line-height: 1;
}
.score-watch { color: var(--yellow); }
.score-ready { color: var(--fire2); }
.score-break { color: var(--fire); text-shadow: 0 0 12px rgba(255,85,0,.5); }
.score-late  { color: var(--text3); }
.energy-bar-wrap {
  height: 6px;
  background: var(--surface2);
  border-radius: 3px;
  overflow: hidden;
}
.energy-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width .6s ease;
  animation: energyPulse 2s infinite;
}
.fill-watch { background: linear-gradient(90deg, rgba(255,208,0,.6), var(--yellow)); }
.fill-ready { background: linear-gradient(90deg, var(--orange), var(--fire2)); }
.fill-break { background: linear-gradient(90deg, var(--orange), var(--fire)); }
.fill-late  { background: var(--border2); }

/* 상세 지표 그리드 */
.metrics-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 6px;
  margin-bottom: 10px;
}
.metric-item {
  background: var(--surface2);
  border-radius: 8px;
  padding: 7px 8px;
}
.metric-label {
  font-size: 8px;
  color: var(--text3);
  font-family: var(--mono);
  margin-bottom: 3px;
}
.metric-val {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 700;
  color: var(--text);
}
.metric-val.good { color: var(--green); }
.metric-val.warn { color: var(--yellow); }
.metric-val.fire { color: var(--fire2); }
.metric-val.hot  { color: var(--fire); }
.metric-val.dim  { color: var(--text3); }

/* 압축 지속 표시 */
.compression-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
  padding: 7px 10px;
  background: var(--surface2);
  border-radius: 8px;
}
.comp-label {
  font-size: 9px;
  color: var(--text3);
  font-family: var(--mono);
  flex-shrink: 0;
}
.comp-bars {
  display: flex;
  gap: 3px;
  flex: 1;
}
.comp-bar {
  height: 12px;
  flex: 1;
  border-radius: 2px;
  background: var(--border);
  transition: background .3s;
}
.comp-bar.filled-weak { background: rgba(255,208,0,.4); }
.comp-bar.filled-good { background: rgba(255,138,0,.6); }
.comp-bar.filled-strong { background: var(--fire); box-shadow: 0 0 4px var(--fire); }
.comp-count {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
}
.comp-weak   { color: var(--yellow); }
.comp-good   { color: var(--fire2); }
.comp-strong { color: var(--fire); }
.comp-text {
  font-size: 9px;
  color: var(--text3);
  flex-shrink: 0;
}

/* 섹터 동반 */
.sector-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}
.sector-badge {
  font-size: 9px;
  font-weight: 700;
  font-family: var(--mono);
  padding: 2px 8px;
  border-radius: 6px;
  border: 1px solid rgba(184,132,255,.3);
  background: rgba(184,132,255,.07);
  color: var(--purple);
}
.sector-co-badge {
  font-size: 9px;
  color: var(--text3);
  font-family: var(--mono);
}
.sector-co-badge.active {
  color: var(--green);
  font-weight: 700;
}

/* 상태 배지 */
.status-badge-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.status-badge {
  font-size: 10px;
  font-weight: 700;
  font-family: var(--mono);
  padding: 4px 12px;
  border-radius: 20px;
  border: 1px solid;
  letter-spacing: .5px;
}
.sb-watch { color: var(--yellow); border-color: rgba(255,208,0,.4); background: rgba(255,208,0,.08); }
.sb-ready { color: var(--fire2);  border-color: rgba(255,170,0,.5); background: rgba(255,170,0,.1); animation: blink 1.5s infinite; }
.sb-break { color: var(--fire);   border-color: rgba(255,85,0,.6);  background: rgba(255,85,0,.12); animation: firePulse 1s infinite; }
.sb-late  { color: var(--text3);  border-color: var(--border);       background: transparent; }

.vwap-badge {
  font-size: 9px;
  font-weight: 700;
  font-family: var(--mono);
  padding: 2px 8px;
  border-radius: 6px;
}
.vwap-above { color: var(--green);  border: 1px solid rgba(0,255,136,.3); background: rgba(0,255,136,.07); }
.vwap-below { color: var(--red);    border: 1px solid rgba(255,58,58,.3); background: rgba(255,58,58,.07); }

/* 액션 버튼 */
.card-actions {
  display: flex;
  gap: 6px;
}
.act-btn {
  flex: 1;
  padding: 8px 6px;
  border-radius: 9px;
  font-size: 11px;
  font-weight: 700;
  font-family: var(--sans);
  border: 1px solid;
  cursor: pointer;
  text-align: center;
  transition: all .15s;
  -webkit-user-select: none;
}
.act-btn:active { transform: scale(.95); }
.act-watch  { color: var(--yellow); border-color: rgba(255,208,0,.3); background: rgba(255,208,0,.07); }
.act-strike { color: var(--orange); border-color: rgba(255,138,0,.35); background: rgba(255,138,0,.08); }
.act-trinity{ color: var(--teal);   border-color: rgba(0,212,255,.3);  background: rgba(0,212,255,.07); }

/* 늦음 오버레이 */
.late-overlay {
  position: absolute;
  top: 8px; right: 12px;
  font-size: 10px;
  font-weight: 700;
  font-family: var(--mono);
  color: var(--text3);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 2px 8px;
}

/* 가짜 점화 경고 */
.fake-warn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 10px;
  background: rgba(255,58,58,.06);
  border: 1px solid rgba(255,58,58,.2);
  border-radius: 7px;
  margin-bottom: 8px;
  font-size: 10px;
  color: var(--red);
}

/* ━━ 빈 상태 ━━ */
.empty-state {
  margin: 40px 16px;
  text-align: center;
  padding: 40px 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
}
.empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty-title { font-size: 14px; font-weight: 700; color: var(--text2); margin-bottom: 6px; }
.empty-desc  { font-size: 11px; color: var(--text3); line-height: 1.6; }

/* ━━ 하단 퀵바 ━━ */
.quick-bar {
  position: fixed;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 100%; max-width: 480px;
  background: rgba(7,9,14,.92);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-top: 1px solid var(--border);
  padding: 8px 16px 20px;
  display: flex;
  gap: 8px;
  z-index: 100;
}
.qb-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 8px 4px;
  border-radius: 10px;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--surface);
  transition: all .15s;
  text-decoration: none;
  -webkit-user-select: none;
  user-select: none;
}
.qb-btn:active { transform: scale(.94); }
.qb-icon  { font-size: 18px; line-height: 1; }
.qb-label { font-size: 8px; font-weight: 700; font-family: var(--mono); white-space: nowrap; }
.qb-hub     { color: var(--text2);  border-color: rgba(120,150,180,.2); }
.qb-ignition{ color: var(--fire2);  border-color: rgba(255,170,0,.3); background: rgba(255,170,0,.04); }
.qb-strike  { color: var(--orange); border-color: rgba(255,138,0,.2); }
.qb-trinity { color: var(--teal);   border-color: rgba(0,212,255,.2); }

/* ━━ 데이터 신뢰도 배지 ━━ */
.trust-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid var(--border);
}
.trust-badge {
  font-size: 9px;
  font-weight: 700;
  font-family: var(--mono);
  padding: 2px 8px;
  border-radius: 6px;
  border: 1px solid;
  letter-spacing: .5px;
}
.trust-real  { color: var(--green);  border-color: rgba(0,255,136,.35); background: rgba(0,255,136,.07); }
.trust-mixed { color: var(--yellow); border-color: rgba(255,208,0,.35); background: rgba(255,208,0,.07); }
.trust-demo  { color: var(--text3);  border-color: var(--border2);       background: var(--surface2); }

.trust-source {
  font-size: 9px;
  color: var(--text3);
  font-family: var(--mono);
}
.trust-source span {
  color: var(--text2);
}

/* 시뮬 표시 태그 */
.sim-tag {
  font-size: 8px;
  font-family: var(--mono);
  color: var(--text3);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1px 5px;
  margin-left: 4px;
  vertical-align: middle;
}
.sim-tag.approx {
  color: var(--yellow);
  border-color: rgba(255,208,0,.25);
  background: rgba(255,208,0,.05);
}

.toast {
  position: fixed; bottom: 90px; left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--surface3); border: 1px solid var(--border2);
  color: var(--text); border-radius: 10px;
  padding: 9px 16px; font-size: 12px; font-weight: 600;
  opacity: 0; transition: all .25s; pointer-events: none;
  z-index: 200; white-space: nowrap; max-width: 320px; text-align: center;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.ok   { border-color: rgba(0,255,136,.3); color: var(--green); }
.toast.fire { border-color: rgba(255,85,0,.4);  color: var(--fire2); }
.toast.warn { border-color: rgba(255,208,0,.3); color: var(--yellow); }
/* ============================================
   🔱 Trinity v2.1 — Action Toast Styles
   ============================================ */
.trinity-toast-container {
  position: fixed;
  top: 70px;
  right: 12px;
  left: 12px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 8px;
  pointer-events: none;
}

<script>
'use strict';

const RAIL_MAIN = 'https://fastapi-production-f631.up.railway.app';

// ━━ 시계 ━━
const DAYS = ['일','월','화','수','목','금','토'];
function updateClock() {
  const now = new Date();
  const kst = new Date(now.getTime() + now.getTimezoneOffset()*60000 + 9*3600000);
  const hh = String(kst.getHours()).padStart(2,'0');
  const mm = String(kst.getMinutes()).padStart(2,'0');
  const ss = String(kst.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent = `${hh}:${mm}:${ss}`;
  document.getElementById('dateStr').textContent =
    `${kst.getFullYear()}.${String(kst.getMonth()+1).padStart(2,'0')}.${String(kst.getDate()).padStart(2,'0')} (${DAYS[kst.getDay()]})`;

  const h = kst.getHours(), m = kst.getMinutes();
  const tot = h*60+m, dow = kst.getDay();
  const isWeekday = dow>=1 && dow<=5;
  const mktEl = document.getElementById('mktStatus');
  const lbEl  = document.getElementById('mktLabel');
  if (!isWeekday || !(tot>=540 && tot<930)) {
    mktEl.className='mkt-status mkt-close'; lbEl.textContent= isWeekday? '장 마감':'휴장';
  } else {
    mktEl.className='mkt-status mkt-open'; lbEl.textContent='장 중';
  }
}
setInterval(updateClock, 1000);
updateClock();

// ━━ 필터 상태 ━━
let currentFilter = 'ALL';
let allCards = [];

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.className = 'filter-btn';
  });
  const map = { ALL:'active-all', WATCH:'active-watch', READY:'active-ready', BREAK:'active-break' };
  document.getElementById('f-'+f.toLowerCase()).classList.add(map[f]);
  renderCards();
}

// ━━ IGNITION 점수 계산 ━━
function calcIgnitionScore(stock) {
  let score = 0;
  const breakdown = {};

  // 1. 거래량 배율 — null이면 중립(기여 없음)
  if (stock.volRatio != null) {
    if (stock.volRatio >= 2.0)      { score += 30; breakdown.vol = 30; }
    else if (stock.volRatio >= 1.5) { score += 15; breakdown.vol = 15; }
    else                            { breakdown.vol = 0; }
  } else {
    breakdown.vol = 0; // 데이터 없음 → 0점 (감점 없음)
  }

  // 2. 고점 압박
  const highGap = stock.highPrice > stock.price
    ? (stock.price / stock.highPrice - 1) * 100
    : 0;
  if (highGap >= -1.0)      { score += 20; breakdown.highGap = 20; }
  else if (highGap >= -2.0) { score += 10; breakdown.highGap = 10; }
  else                      { breakdown.highGap = 0; }

  // 3. 변동성 압축 — null이면 중립
  if (stock.volCompRatio != null) {
    if (stock.volCompRatio < 0.5)      { score += 20; breakdown.compression = 20; }
    else if (stock.volCompRatio < 0.7) { score += 10; breakdown.compression = 10; }
    else                               { breakdown.compression = 0; }
  } else {
    breakdown.compression = 0;
  }

  // 4. VWAP 위 필터 (점수 아님)
  breakdown.vwapAbove = stock.price > stock.vwap;

  // 5. 캔들 안정성
  const range = stock.highPrice - stock.lowPrice;
  const candlePos = range > 0 ? (stock.price - stock.lowPrice) / range : 0.5;
  if (candlePos >= 0.7)      { score += 15; breakdown.candle = 15; }
  else if (candlePos >= 0.5) { score += 8;  breakdown.candle = 8; }
  else                       { breakdown.candle = 0; }

  // 6. 섹터 동반 — null이면 중립
  if (stock.sectorCo != null) {
    if (stock.sectorCo >= 2) { score += 15; breakdown.sector = 15; }
    else                     { breakdown.sector = 0; }
  } else {
    breakdown.sector = 0;
  }

  return { score, breakdown, highGap };
}

function getStatus(score, stock) {
  // 등락률 +10% 초과 → 늦음
  if (stock.changePct > 10) return 'LATE';
  // 거래량 없으면 제외
  if (stock.volRatio != null && stock.volRatio < 0.5) return 'LATE';
  // 가짜 점화 필터
  if (stock.fakeSignal) return 'LATE';
  // VWAP 아래면 격하 (필터이지 제외 아님)
  const vwapOk = !stock.price || stock.price > stock.vwap;

  // 데이터 완전도에 따라 임계값 조정
  const isPartial = stock.source !== 'REAL';
  // REAL: 70/80/90, MIXED: 40/55/75 (부분데이터 보정)
  const tWatch = isPartial ? 40 : 70;
  const tReady = isPartial ? 55 : 80;
  const tBreak = isPartial ? 75 : 90;

  if (score >= tBreak && stock.breakout && vwapOk) return 'BREAK';
  if (score >= tReady && vwapOk) return 'READY';
  if (score >= tWatch) return 'WATCH';
  return null;
}

// ━━ 압축 바 렌더 ━━
function renderCompBars(bars) {
  const total = 10;
  let html = '';
  for (let i = 0; i < total; i++) {
    let cls = '';
    if (i < bars) {
      if (bars <= 3)  cls = 'comp-bar filled-weak';
      else if (bars <= 6) cls = 'comp-bar filled-good';
      else cls = 'comp-bar filled-strong';
    } else {
      cls = 'comp-bar';
    }
    html += `<div class="${cls}"></div>`;
  }
  return html;
}

// ━━ 카드 HTML 생성 (신뢰도 배지 포함) ━━
function buildCardHTML(stock, result) {
  const { score, breakdown, highGap } = result;
  // 🔧 채피 버그 수정 #1 — 서버 상태가 있으면 우선 사용 (백엔드 판정 신뢰)
  const status = stock.serverStatus || getStatus(score, stock);
  if (!status) return null;

  const isLate = status === 'LATE';
  const pctSign = stock.changePct >= 0 ? '+' : '';
  const pctClass = stock.changePct > 0 ? 'chg-up' : stock.changePct < 0 ? 'chg-down' : 'chg-flat';

  const scoreClass = isLate ? 'score-late' : status==='BREAK'?'score-break':status==='READY'?'score-ready':'score-watch';
  const fillClass  = isLate ? 'fill-late'  : status==='BREAK'?'fill-break':status==='READY'?'fill-ready':'fill-watch';
  const fillWidth  = Math.min(score, 100);
  const sbClass = isLate ? 'sb-late' : status==='BREAK'?'sb-break':status==='READY'?'sb-ready':'sb-watch';
  const sbText  = isLate ? '⏰ 늦음' : status==='BREAK'?'🔥 BREAK':status==='READY'?'⚡ READY':'👁 WATCH';
  const vwapClass = breakdown.vwapAbove ? 'vwap-above' : 'vwap-below';
  const vwapText  = breakdown.vwapAbove ? '▲ VWAP 위' : '▼ VWAP 아래';
  const volClass  = stock.volRatio >= 2.0 ? 'hot' : stock.volRatio >= 1.5 ? 'fire' : 'dim';
  const highClass = highGap >= -1.0 ? 'hot' : highGap >= -2.0 ? 'warn' : 'dim';
  const compClass = stock.volCompRatio < 0.5 ? 'hot' : stock.volCompRatio < 0.7 ? 'fire' : 'dim';
  const compCountClass = stock.compBars >= 8 ? 'comp-strong' : stock.compBars >= 5 ? 'comp-good' : 'comp-weak';
  const compCountText  = stock.compBars >= 8 ? '강력' : stock.compBars >= 5 ? '좋음' : '약함';

  // ━━ 신뢰도 판별 ━━
  const src = stock.source || 'DEMO';
  const isReal  = src === 'REAL';
  const isMixed = src === 'MIXED' || src === 'KIS+ESTIMATED_VWAP';
  const isDemo  = src === 'DEMO';
  const trustClass  = isReal ? 'trust-real' : isMixed ? 'trust-mixed' : 'trust-demo';
  const trustLabel  = isReal ? '🟢 REAL' : isMixed ? '🟡 MIXED' : '🔴 DEMO';
  const sourceText  = stock.sourceDetail || (isDemo ? 'DEMO · 샘플데이터' : isReal ? 'KIS + proxy' : 'KIS + estimated VWAP');

  // 각 지표 시뮬/근사 태그
  const vwapTag   = stock.vwapEstimated   ? '<span class="sim-tag approx">근사</span>'  : '';
  const compTag   = stock.compEstimated   ? '<span class="sim-tag">시뮬</span>'          : '';
  const sectorTag = stock.sectorEstimated ? '<span class="sim-tag">시뮬</span>'          : '';

  const fakeWarnHTML = stock.fakeSignal
    ? `<div class="fake-warn">⚠️ 윗꼬리 과다 — 가짜 점화 주의</div>` : '';

  const actionsHTML = isLate ? '' : `
    <div class="card-actions">
      <button class="act-btn act-watch"   onclick="watchStock('${stock.code}','${stock.name}')">관찰</button>
      <button class="act-btn act-strike"  onclick="sendToStrike('${stock.code}','${stock.name}',${stock.price},${stock.changePct})">⚡ Strike</button>
      <button class="act-btn act-trinity" onclick="sendToTrinity('${stock.code}','${stock.name}')">🔱 Trinity</button>
    </div>`;

  return `
    <div class="ign-card status-${status}" id="card-${stock.code}" data-status="${status}">
      ${isLate ? '<div class="late-overlay">⏰ 늦음</div>' : ''}
      <div class="card-head">
        <div class="card-name-block">
          <div class="card-name">${stock.name}</div>
          <div class="card-code">${stock.code}</div>
          <div class="card-sector">📌 ${stock.sector}</div>
        </div>
        <div class="card-price-block">
          <div class="card-price">${stock.price.toLocaleString()}원</div>
          <div class="card-change ${pctClass}">${pctSign}${stock.changePct.toFixed(1)}%</div>
        </div>
      </div>

      <div class="energy-section">
        <div class="energy-header">
          <div class="energy-label">IGNITION ENERGY${stock.source!=='REAL'?'<span style="font-size:8px;color:var(--text3);margin-left:4px;">(부분데이터)</span>':''}</div>
          <div class="energy-score ${scoreClass}">${isLate?'--':score}</div>
        </div>
        <div class="energy-bar-wrap">
          <div class="energy-bar-fill ${fillClass}" style="width:${isLate?0:fillWidth}%"></div>
        </div>
      </div>

      <div class="metrics-grid">
        <div class="metric-item">
          <div class="metric-label">거래량 배율</div>
          <div class="metric-val ${volClass}">${stock.volRatio != null ? stock.volRatio.toFixed(1)+'x' : '<span style="color:var(--text3);font-size:11px;">데이터 없음</span>'}</div>
        </div>
        <div class="metric-item">
          <div class="metric-label">고점 근접도</div>
          <div class="metric-val ${highClass}">${highGap.toFixed(1)}%</div>
        </div>
        <div class="metric-item">
          <div class="metric-label">변동성압축${compTag}</div>
          <div class="metric-val ${compClass}">${stock.volCompRatio != null ? (stock.volCompRatio*100).toFixed(0)+'%' : '<span style="color:var(--text3);font-size:11px;">--</span>'}</div>
        </div>
      </div>

      <div class="compression-row">
        <div class="comp-label">압축지속${compTag}</div>
        <div class="comp-bars">${renderCompBars(stock.compBars || 0)}</div>
        <div class="comp-count ${compCountClass}">${stock.compBars != null ? stock.compBars+'봉' : '--'}</div>
        <div class="comp-text">${compCountText}</div>
      </div>

      <div class="sector-row">
        <div class="sector-badge">${stock.sector}</div>
        <div class="sector-co-badge ${stock.sectorCo>=2?'active':''}">
          섹터동반 ${stock.sectorCo}종목${sectorTag} ${stock.sectorCo>=2?'✓':''}
        </div>
      </div>

      ${fakeWarnHTML}

      <div class="status-badge-row">
        <div class="status-badge ${sbClass}">${sbText}</div>
        <div class="vwap-badge ${vwapClass}">${vwapText}${vwapTag}</div>
      </div>

      ${actionsHTML}

      <!-- 데이터 신뢰도 -->
      <div class="trust-row">
        <div class="trust-badge ${trustClass}">${trustLabel}</div>
        <div class="trust-source">source: <span>${sourceText}</span></div>
      </div>
    </div>`;
}

// ━━ 렌더 ━━
function renderCards() {
  const list = document.getElementById('cardsList');
  const empty = document.getElementById('emptyState');

  // 🔧 채피 버그 수정 #3 — 카운터 먼저 업데이트 (early return으로 빠지기 전에)
  const all = allCards;
  document.getElementById('cnt-watch').textContent = all.filter(c=>c.status==='WATCH').length;
  document.getElementById('cnt-ready').textContent = all.filter(c=>c.status==='READY').length;
  document.getElementById('cnt-break').textContent = all.filter(c=>c.status==='BREAK').length;

  const filtered = currentFilter === 'ALL'
    ? allCards
    : allCards.filter(c => c.status === currentFilter);

  if (filtered.length === 0) {
    list.innerHTML = '';
    empty.style.display = 'block';
    empty.querySelector('.empty-title').textContent =
      currentFilter === 'ALL' ? '압축 종목 없음' : `${currentFilter} 종목 없음`;
    list.appendChild(empty);
    return;
  }
  empty.style.display = 'none';

  // BREAK > READY > WATCH > LATE 순
  const order = { BREAK:0, READY:1, WATCH:2, LATE:3 };
  filtered.sort((a,b) => (order[a.status]??9) - (order[b.status]??9) || b.score - a.score);

  list.innerHTML = filtered.map(c => c.html).join('');
}

// ━━ 스캔 실행 ━━
async function runScan() {
  const btn = document.getElementById('scanBtn');
  btn.classList.add('scanning');
  btn.innerHTML = '⏳ 스캔 중...';
  allCards = [];

  try {
    // IGNITION 실데이터 가져오기 (백엔드가 score/status까지 계산)
    let stocks = [];
    let fetchErrorDetail = null;
    let serverCounts = null;  // 서버에서 받은 watch/ready/break 카운트
    try {
      const url = `${RAIL_MAIN}/ignition_scan`;
      console.log('[IGNITION] fetch 시작:', url);
      const t0 = performance.now();

      const res = await fetch(url, {
        method: 'GET',
        signal: AbortSignal.timeout(15000),  // 네이버 크롤링 시간 여유
        headers: { 'Accept': 'application/json' }
      });

      const elapsed = (performance.now() - t0).toFixed(0);
      console.log(`[IGNITION] 응답 수신: HTTP ${res.status} (${elapsed}ms)`);

      if (!res.ok) {
        fetchErrorDetail = `HTTP ${res.status} ${res.statusText}`;
        throw new Error(fetchErrorDetail);
      }

      const data = await res.json();
      console.log('[IGNITION] /ignition_scan 응답:', {
        status: data.status,
        count:  data.count,
        watch:  data.watch,
        ready:  data.ready,
        break:  data.break
      });

      // 서버 에러 응답 처리
      if (data.status === 'error') {
        fetchErrorDetail = data.message || '서버 내부 오류';
        throw new Error(fetchErrorDetail);
      }

      if (data && Array.isArray(data.items)) {
        serverCounts = {
          watch:     data.watch || 0,
          ready:     data.ready || 0,
          break:     data.break || 0,
          total:     data.count || 0,
          raw:       data.raw_count || 0,         // 네이버 원본 종목수
          filtered:  data.filtered_count || 0,    // ETF 제외 후 종목수
          excludeEtf: data.exclude_etf !== false  // 기본 true
        };

        // 서버 응답 형식에 맞춰 매핑
        // 서버: code, name, price, change_pct, volume, market, rank, score, status
        stocks = data.items.map(s => ({
          name:       s.name  || '',
          code:       s.code  || '',
          sector:     s.market === 'kospi' ? '코스피' : s.market === 'kosdaq' ? '코스닥' : '기타',
          sectorCo:   null,
          price:      s.price || 0,
          highPrice:  s.price * 1.005,   // 백엔드에 없음 — 추정
          lowPrice:   s.price * 0.995,   // 백엔드에 없음 — 추정
          vwap:       s.price * 0.99,    // 백엔드에 없음 — 추정
          volRatio:   null,               // 백엔드에 없음
          volCompRatio: null,
          changePct:  s.change_pct || 0,
          volume:     s.volume || 0,
          rank:       s.rank || 99,
          compBars:   null,
          breakout:   s.status === 'BREAK',
          fakeSignal: false,
          // 백엔드가 이미 계산한 점수/상태 직접 사용
          serverScore:  s.score,
          serverStatus: s.status,
          // 신뢰도
          source:       'REAL',
          sourceDetail: '네이버 거래량 TOP30',
          vwapEstimated:   true,
          compEstimated:   true,
          sectorEstimated: false,
        }));

        // 🔱 Trinity v2.1 — 백엔드 events 처리
        // 채피가 추가하면 자동 작동, 없으면 조용히 무시
        handleEventsWithGuard(data.events);
      } else {
        fetchErrorDetail = '응답 형식 오류 (items 배열 없음)';
        console.warn('[IGNITION]', fetchErrorDetail, data);
        throw new Error(fetchErrorDetail);
      }
    } catch (e) {
      // 에러 종류 분류
      let errType = '알 수 없음';
      if (e.name === 'TimeoutError' || e.name === 'AbortError') {
        errType = '타임아웃 (15초 초과)';
      } else if (e.message && e.message.includes('Failed to fetch')) {
        errType = 'CORS 또는 네트워크 차단';
      } else if (e.message && e.message.startsWith('HTTP')) {
        errType = e.message;
      } else if (fetchErrorDetail) {
        errType = fetchErrorDetail;
      } else if (e.message) {
        errType = e.message;
      }
      console.error('[IGNITION] fetch 실패:', errType, e);

      // 데모 데이터로 폴백
      stocks = generateDemoData();
      toast(`서버 실패 (${errType}) — 데모 표시`, 'warn');
    }

    // 점수 계산 및 카드 생성 — 한 종목이 실패해도 나머지는 살림
    for (const stock of stocks) {
      try {
        if (!stock.price || stock.price <= 0) continue;

        let result, status;
        if (stock.serverScore != null && stock.serverStatus) {
          // 백엔드 실데이터 — 서버 점수/상태 직접 사용
          result = {
            score: stock.serverScore,
            breakdown: {
              server: stock.serverScore,
              vwapAbove: true   // 🔧 채피 버그 수정 #2 — 서버 데이터엔 VWAP 정보 없음, 임시 true
            },
            highGap: 0
          };
          status = stock.serverStatus;  // BREAK / READY / WATCH
        } else {
          // 데모 폴백 — 프론트 계산
          result = calcIgnitionScore(stock);
          status = getStatus(result.score, stock);
        }

        if (!status || status === 'IGNORE' || status === 'LATE') continue;
        const html = buildCardHTML(stock, result);
        if (html) {
          allCards.push({ status, score: result.score, html, code: stock.code });
        }
      } catch (e) {
        console.warn('카드 생성 실패:', stock.name, stock.code, e);
      }
    }

    renderCards();

    const breakN = allCards.filter(c=>c.status==='BREAK').length;
    const readyN = allCards.filter(c=>c.status==='READY').length;
    const totalN = allCards.length;

    console.log(`[IGNITION] 스캔 결과 — 입력 ${stocks.length}종목, 카드 ${totalN}개 (BREAK ${breakN}, READY ${readyN})`);
    if (serverCounts) {
      console.log(`[IGNITION] 서버 필터 — raw ${serverCounts.raw} → filtered ${serverCounts.filtered} (ETF 제외: ${serverCounts.excludeEtf})`);
    }

    // ETF 필터 적용 표시
    const etfTag = (serverCounts && serverCounts.excludeEtf) ? ' · ETF 제외' : '';
    const etfRemoved = (serverCounts && serverCounts.excludeEtf)
      ? ` (${serverCounts.raw}→${serverCounts.filtered})`
      : '';

    if (stocks.length === 0) {
      toast('데이터 없음 — 서버 응답 확인 필요', 'warn');
    } else if (totalN === 0) {
      toast(`${stocks.length}종목 스캔 — 조건 충족 없음${etfTag}`, '');
    } else if (breakN > 0) {
      toast(`🔥 BREAK ${breakN}종목 발견!${etfTag}`, 'fire');
    } else if (readyN > 0) {
      toast(`⚡ READY ${readyN}종목${etfTag}${etfRemoved}`, 'ok');
    } else {
      toast(`WATCH ${totalN}종목 — 모니터링 중${etfTag}`, '');
    }

    // localStorage에 결과 저장 (HUB 연동)
    try {
      localStorage.setItem('trinity_ignition_last', JSON.stringify({
        ts: Date.now(),
        watch: allCards.filter(c=>c.status==='WATCH').length,
        ready: allCards.filter(c=>c.status==='READY').length,
        break: breakN
      }));
    } catch {}

  } catch(e) {
    toast('스캔 오류 — 다시 시도해주세요', 'warn');
  }

  btn.classList.remove('scanning');
  btn.innerHTML = '🔥 IGNITION 스캔';
}

// ============================================
// 🔱 Trinity v2.1 — Event Handler Module
// 작성: 써니 (2026.04.29)
// 백엔드 events 배열 처리 → 토스트 알림 → STRIKE 자동 이동
// ============================================

// 알림 토글 (림빅님이 끄고 싶으면 여기서)
const TRINITY_NOTIFY = {
  BREAK: true,      // 🔥 READY → BREAK
  CONFIRM: true,    // ✅ 점수 ≥85 첫 진입
  READY: false      // ⚡ WATCH → READY (기본 OFF, 노이즈 방지)
};

// 중복 알림 방지 (5분 쿨다운)
const TRINITY_NOTIFIED_CACHE = {};
const TRINITY_NOTIFY_COOLDOWN_MS = 5 * 60 * 1000;

// 첫 스캔 가드 (페이지 로드 직후 알림 폭발 방지)
let TRINITY_FIRST_SCAN = true;

/**
 * 백엔드 events 배열 처리 진입점
 * - events 없거나 빈 배열이면 조용히 무시
 * - 첫 스캔에서는 알림 스킵
 */
function handleEventsWithGuard(events) {
  if (TRINITY_FIRST_SCAN) {
    TRINITY_FIRST_SCAN = false;
    if (Array.isArray(events) && events.length > 0) {
      console.log('[Trinity v2.1] 첫 스캔 — 알림', events.length, '건 스킵');
    }
    return;
  }
  handleEvents(events);
}

function handleEvents(events) {
  if (!Array.isArray(events) || events.length === 0) return;

  events.forEach(ev => {
    const type = classifyEvent(ev);
    if (!type) return;
    if (!TRINITY_NOTIFY[type]) return;

    // 중복 방지
    const cacheKey = `${ev.code}_${type}`;
    const now = Date.now();
    if (TRINITY_NOTIFIED_CACHE[cacheKey] &&
        (now - TRINITY_NOTIFIED_CACHE[cacheKey]) < TRINITY_NOTIFY_COOLDOWN_MS) {
      return;
    }
    TRINITY_NOTIFIED_CACHE[cacheKey] = now;

    showActionToast(ev, type);
  });
}

/**
 * 이벤트 분류
 * 채피 백엔드 응답 구조 호환:
 *   { event: "STATE_CHANGE", from, to, score, ... }
 *   { event: "CONFIRM", score, ... }
 *   { event: "BREAK", ... }
 */
function classifyEvent(ev) {
  if (!ev || typeof ev !== 'object') return null;

  // 명시적 이벤트 타입 (채피 백엔드 직접 분류)
  if (ev.event === 'CONFIRM') return 'CONFIRM';
  if (ev.event === 'BREAK')   return 'BREAK';
  if (ev.event === 'READY')   return 'READY';

  // STATE_CHANGE 형태도 호환 (예비)
  if (ev.event === 'STATE_CHANGE') {
    if (ev.to === 'BREAK') return 'BREAK';
    if (ev.to === 'READY' && ev.from === 'WATCH') return 'READY';
    if (typeof ev.score === 'number' && ev.score >= 85) return 'CONFIRM';
  }
  return null;
}

/**
 * 토스트 알림 표시
 * 클릭 → localStorage 저장 → STRIKE 이동
 */
function showActionToast(ev, type) {
  const container = document.getElementById('trinity-toast-container');
  if (!container) return;

  const config = {
    BREAK:   { icon: '🔥', title: 'BREAK 발생',   cssClass: 'event-break' },
    CONFIRM: { icon: '✅', title: 'CONFIRM 진입', cssClass: 'event-confirm' },
    READY:   { icon: '⚡', title: 'READY 진입',   cssClass: 'event-ready' }
  };
  const cfg = config[type];
  if (!cfg) return;

  const name = ev.name || ev.code || '(알 수 없음)';
  const score = (typeof ev.score === 'number') ? `${ev.score}점` : '';
  const detail = score ? `${name} (${score})` : name;

  const toast = document.createElement('div');
  toast.className = `trinity-toast ${cfg.cssClass}`;
  toast.innerHTML = `
    <div class="trinity-toast-icon">${cfg.icon}</div>
    <div class="trinity-toast-body">
      <div class="trinity-toast-title">${cfg.title}</div>
      <div class="trinity-toast-detail">${detail}</div>
    </div>
    <div class="trinity-toast-arrow">›</div>
  `;

  // 클릭 → STRIKE로 이동 (APP_FILES.strike 사용 — 채피 스펙)
  toast.addEventListener('click', () => {
    const payload = {
      code:      ev.code,
      name:      ev.name,
      score:     ev.score,
      status:    ev.to || ev.status,
      event:     ev.event,
      from:      ev.from,
      source:    'ignition_event',
      timestamp: Date.now()
    };
    try {
      localStorage.setItem('trinity_strike_incoming', JSON.stringify(payload));
    } catch (e) {
      console.warn('[Trinity] localStorage 저장 실패:', e);
    }
    window.location.href = APP_FILES.strike;
  });

  container.appendChild(toast);
  requestAnimationFrame(() => toast.classList.add('show'));

  // BREAK/CONFIRM 12초, READY 8초
  const timeout = (type === 'BREAK' || type === 'CONFIRM') ? 12000 : 8000;
  setTimeout(() => {
    toast.classList.remove('show');
    setTimeout(() => toast.remove(), 300);
  }, timeout);

  console.log(`[Trinity v2.1] ${type}:`, ev);
}

console.log('[Trinity v2.1] 이벤트 핸들러 로드 완료');
</script>
